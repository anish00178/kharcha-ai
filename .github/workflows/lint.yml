name: Frontend Safety Check

on:
  push:
    branches: [ "main" ]

jobs:
  check-code:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: "18"

      - working-directory: ./frontend
        run: npm install

      - working-directory: ./frontend
        run: npm run lint